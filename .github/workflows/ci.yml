name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Python checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: "sqlite:///data/ci.db"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare data directory
        run: |
          mkdir -p data

      - name: Compile Python files
        run: |
          python -m compileall app scripts

      - name: Validate sources config
        run: |
          python scripts/check_sources_config.py

      - name: Run smoke test
        run: |
          python scripts/smoke_test.py

      - name: Run demo data acceptance
        run: |
          python scripts/acceptance_demo_data.py --isolated-db

      - name: Run demo flow acceptance
        run: |
          python scripts/acceptance_demo_flow.py --isolated-db

      - name: Run health check
        run: |
          python scripts/health_check.py
